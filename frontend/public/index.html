          <p style="font-style: italic; line-height: 1.6;">
            In every breath I take today,<br>
            I find a reason to give praise.<br>
            For morning light that breaks the dawn,<br>
            For strength to face what lies beyond.<br><br>
            Selah - pause and reflect<br><br>
            Your faithfulness, O Lord, endures,<br>
            Through every storm, Your love ensures<br>
            That I am held, that I am known,<br>
            Never walking this path alone.
